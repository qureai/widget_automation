<!DOCTYPE html>
<html>
<head>
    <title>RadWhere OpenStudy Event Listener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #eventLog {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .event-entry {
            margin-bottom: 10px;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        .timestamp {
            color: #666;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <h1>RadWhere OpenStudy Event Listener</h1>
    <div id="status">Status: Disconnected</div>
    <button id="connectBtn">Connect to RadWhere</button>
    <div id="eventLog"></div>
    <script src="renderer.js"></script>
</body>
</html>
